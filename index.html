<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASK.EXE // v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0014;
      --panel: #12001f;
      --cyan: #00ffff;
      --magenta: #ff00ff;
      --yellow: #ffff00;
      --green: #39ff14;
      --hot-pink: #ff1493;
      --purple: #7b2cbf;
      --text: #e0e0ff;
      --dim: #8866aa;
    }

    body {
      font-family: 'VT323', monospace;
      font-size: 22px;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* Synthwave grid + sunset */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to bottom, transparent 40%, rgba(255, 0, 128, 0.15) 70%, rgba(255, 100, 0, 0.2) 100%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 49px,
          rgba(0, 255, 255, 0.08) 49px,
          rgba(0, 255, 255, 0.08) 50px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 49px,
          rgba(255, 0, 255, 0.06) 49px,
          rgba(255, 0, 255, 0.06) 50px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 100;
    }

    .terminal {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      border: 3px solid var(--cyan);
      box-shadow:
        0 0 10px var(--cyan),
        0 0 30px rgba(0, 255, 255, 0.3),
        inset 0 0 60px rgba(0, 255, 255, 0.05);
      background: var(--panel);
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.97; }
      94% { opacity: 1; }
      96% { opacity: 0.98; }
    }

    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: linear-gradient(90deg, var(--purple), var(--hot-pink), var(--magenta));
      border-bottom: 2px solid var(--cyan);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0 #000;
    }

    .title-bar .dots {
      display: flex;
      gap: 6px;
    }

    .title-bar .dot {
      width: 10px;
      height: 10px;
      border: 1px solid #000;
      background: var(--yellow);
    }

    .title-bar .dot:nth-child(2) { background: var(--green); }
    .title-bar .dot:nth-child(3) { background: var(--cyan); }

    .screen {
      padding: 20px;
    }

    .header {
      margin-bottom: 20px;
      text-align: center;
    }

    .header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      line-height: 1.8;
      color: var(--cyan);
      text-shadow:
        0 0 5px var(--cyan),
        0 0 15px var(--cyan),
        2px 2px 0 var(--magenta);
      margin-bottom: 8px;
    }

    .header .subtitle {
      font-size: 18px;
      color: var(--magenta);
      text-shadow: 0 0 8px var(--magenta);
      letter-spacing: 3px;
    }

    .prompt-line {
      color: var(--green);
      margin-bottom: 12px;
      font-size: 20px;
    }

    .prompt-line::before {
      content: '> ';
      color: var(--yellow);
    }

    form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"],
    #input {
      flex: 1;
      padding: 8px 12px;
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--green);
      background: #000;
      border: 2px inset var(--dim);
      outline: none;
      caret-color: var(--green);
      text-shadow: 0 0 5px var(--green);
    }

    input[type="text"]:focus,
    #input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
    }

    input[type="text"]::placeholder,
    #input::placeholder {
      color: var(--dim);
      text-shadow: none;
    }

    button {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 12px 14px;
      cursor: pointer;
      border: 2px outset var(--cyan);
      background: linear-gradient(180deg, #2a0050 0%, #1a0030 100%);
      color: var(--cyan);
      text-shadow: 0 0 5px var(--cyan);
      letter-spacing: 1px;
      transition: none;
    }

    button:active {
      border-style: inset;
      transform: translateY(1px);
    }

    button[type="submit"] {
      color: var(--yellow);
      border-color: var(--yellow);
      text-shadow: 0 0 5px var(--yellow);
    }

    .divider {
      border: none;
      border-top: 1px dashed var(--magenta);
      margin: 16px 0;
      opacity: 0.6;
    }

    .section-label {
      font-size: 16px;
      color: var(--hot-pink);
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px dotted rgba(255, 0, 255, 0.3);
      transition: background 0.1s;
    }

    li:hover {
      background: rgba(255, 0, 255, 0.08);
    }

    li input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--cyan);
      background: #000;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }

    li input[type="checkbox"]:checked {
      background: var(--magenta);
      box-shadow: 0 0 8px var(--magenta);
    }

    li input[type="checkbox"]:checked::after {
      content: 'X';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: #fff;
    }

    li span {
      flex: 1;
      color: var(--text);
      letter-spacing: 1px;
    }

    li.done span {
      text-decoration: line-through;
      color: var(--dim);
      text-shadow: none;
    }

    li button {
      padding: 6px 10px;
      font-size: 10px;
      color: var(--hot-pink);
      border-color: var(--hot-pink);
      text-shadow: 0 0 5px var(--hot-pink);
      background: linear-gradient(180deg, #300020 0%, #1a0010 100%);
    }

    .empty {
      color: var(--dim);
      font-size: 20px;
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--dim);
      animation: blink 1.5s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      background: #000;
      border-top: 2px solid var(--purple);
      font-size: 16px;
      color: var(--green);
      letter-spacing: 1px;
    }

    .status-bar .time {
      color: var(--cyan);
      text-shadow: 0 0 5px var(--cyan);
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="title-bar">
      <span>TASK.EXE</span>
      <div class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
    <div class="screen">
      <div class="header">
        <h1>TASK MANAGER</h1>
        <div class="subtitle">* PERSONAL DATABASE *</div>
      </div>
      <div class="prompt-line">ENTER NEW TASK:</div>
      <form id="form">
        <input id="input" type="text" placeholder="type here..." autocomplete="off" />
        <button type="submit">ADD</button>
      </form>
      <hr class="divider">
      <div class="section-label">// Active Records</div>
      <ul id="list"></ul>
      <p id="empty" class="empty">*** NO DATA FOUND ***</p>
    </div>
    <div class="status-bar">
      <span>MEM: OK</span>
      <span class="time" id="clock">00:00:00</span>
      <span>READY_</span>
    </div>
  </div>
  <script>
    const key = 'todos';
    let todos = JSON.parse(localStorage.getItem(key) || '[]');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const clock = document.getElementById('clock');

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function save() {
      localStorage.setItem(key, JSON.stringify(todos));
      render();
    }

    function render() {
      list.innerHTML = '';
      todos.forEach((todo, i) => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = todo.done;
        cb.onchange = () => { todos[i].done = cb.checked; save(); };
        const span = document.createElement('span');
        span.textContent = todo.text;
        const del = document.createElement('button');
        del.textContent = 'DEL';
        del.onclick = () => { todos.splice(i, 1); save(); };
        li.append(cb, span, del);
        list.append(li);
      });
      empty.hidden = todos.length > 0;
    }

    form.onsubmit = (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      save();
    };

    render();
  </script>
</body>
</html>
