<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; margin-bottom: 12px; }
    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 12px; border: none; border-radius: 6px; background: #111; color: #fff; cursor: pointer; }
    ul { list-style: none; }
    li { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
    li.done span { text-decoration: line-through; color: #888; }
    .empty { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Todo</h1>
  <form id="form">
    <input id="input" placeholder="Add a task..." autocomplete="off" />
    <button type="submit">Add</button>
  </form>
  <ul id="list"></ul>
  <p id="empty" class="empty">No tasks yet.</p>
  <script>
    const key = 'todos';
    let todos = JSON.parse(localStorage.getItem(key) || '[]');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const form = document.getElementById('form');
    const input = document.getElementById('input');

    function save() {
      localStorage.setItem(key, JSON.stringify(todos));
      render();
    }

    function render() {
      list.innerHTML = '';
      todos.forEach((todo, i) => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = todo.done;
        cb.onchange = () => { todos[i].done = cb.checked; save(); };
        const span = document.createElement('span');
        span.textContent = todo.text;
        const del = document.createElement('button');
        del.textContent = '×';
        del.onclick = () => { todos.splice(i, 1); save(); };
        li.append(cb, span, del);
        list.append(li);
      });
      empty.hidden = todos.length > 0;
    }

    form.onsubmit = (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false });
      input.value = '';
      save();
    };

    render();
  </script>
</body>
</html>
